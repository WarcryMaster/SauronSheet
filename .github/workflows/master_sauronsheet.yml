# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - SauronSheet

on:
  push:
    branches:
      - 'RELEASE/Sauron.Sheet/*'
  workflow_dispatch:

env:
  NODE_NO_WARNINGS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4.2.0
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore -c Release

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore

      - name: Run .NET Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Run Playwright E2E Tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          Supabase__JwtSecret: ${{ secrets.SUPABASE_JWTSECRET }}
        run: npx playwright test --config=e2e/playwright.config.ts

      - name: Upload Playwright test results
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4.6.2
        with:
          name: playwright-report
          path: |
            e2e/results/
            test-results/
          retention-days: 5

      - name: Clean node_modules before publish
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        shell: pwsh

      - name: dotnet publish
        run: dotnet publish -c Release -o ./publish --no-restore

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dotnet-app
          path: ./publish
          retention-days: 3

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4.3.0
        with:
          name: dotnet-app
      
      - name: Login to Azure
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8867D19E64C14277B9A587E51C54AF91 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FFC00761C530482A9034710664410AB9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_39819FDD31EA4153AD98461C053604BF }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@b686016b4de8820a23519503685d03fbfa03a6
        with:
          app-name: 'SauronSheet'
          slot-name: 'Production'
          package: .
