<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SauronSheet logo" color="#556B2F">
  <title>SauronSheet</title>
  <desc>An almond eye with a chart trend line inside the iris, representing vigilant financial tracking.</desc>

  <!-- Eye outline (almond shape) — currentColor inherits context, defaults to brand -->
  <path d="M 3 32 C 12 13 24 7 32 7 C 40 7 52 13 61 32 C 52 51 40 57 32 57 C 24 57 12 51 3 32 Z"
        fill="none" stroke="currentColor" stroke-width="4"
        stroke-linejoin="round" stroke-linecap="round" />

  <!-- Iris (solid brand fill — gives visual weight at small sizes) -->
  <circle cx="32" cy="32" r="13" fill="#556B2F" />

  <!-- Chart trend line inside iris (brand-light on dark iris — high contrast) -->
  <polyline points="25,39 32,33 39,22"
            fill="none" stroke="#f4f7ee" stroke-width="3.2"
            stroke-linecap="round" stroke-linejoin="round" />

  <!-- Endpoint dot (the goal / target) -->
  <circle cx="39" cy="22" r="2" fill="#f4f7ee" />
</svg>
