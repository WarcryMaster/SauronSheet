schema: spec-driven
project: SauronSheet
artifact_store:
  mode: hybrid
  engram: enabled
  openspec: enabled
strict_tdd: true
context: |
  Stack: .NET 10 / C# con Razor Pages, MediatR, Supabase/Postgrest, PdfPig y Playwright.
  Runtime: global.json fija SDK 10.0.100; el entorno local resolvió dotnet 10.0.300.
  Arquitectura: Clean Architecture + CQRS + DDD con IDs tipados, value objects, domain services y specifications.
  Frontend: Razor Pages + MDBootstrap 9.2.0 por CDN; autenticación Supabase Auth con JWT en cookies HttpOnly.
  Observabilidad: Sentry obligatorio en backend y frontend; sin Console.WriteLine ni equivalentes.
  Lenguaje: código/identificadores/trazas en English; conversación, specs y planes en español neutro.
  Solución: SauronSheet.slnx con 4 proyectos src y 5 proyectos de test.
  Testing: xUnit + Moq para unit/integration/frontend, Playwright E2E y red-green-refactor obligatorio.
testing:
  detected_on: 2026-05-25
  runner: dotnet test
  framework: xUnit
  projects:
    - tests/SauronSheet.Domain.Tests
    - tests/SauronSheet.Application.Tests
    - tests/SauronSheet.Infrastructure.Tests
    - tests/SauronSheet.Integration.Tests
    - tests/SauronSheet.Frontend.Tests
  e2e: npx playwright test --config=e2e/playwright.config.ts --project=chromium
  unit: xUnit + Moq
  integration: xUnit + Moq + in-memory doubles
  frontend: xUnit + Moq
  coverage: dotnet test --collect:"XPlat Code Coverage"
  coverage_tool: coverlet.collector 6.0.0 en Domain/Application/Frontend; Infrastructure e Integration no lo referencian actualmente
  linter: dotnet build
  linter_notes: Directory.Build.props fuerza TreatWarningsAsErrors=true; Frontend e Infrastructure lo rebajan a false
  formatter: dotnet format
  type_checker: C# nullable enabled (Roslyn)
  spell_check: npx cspell (disponible en entorno local, no fijado en package.json)
  e2e_notes: playwright.config.ts define chromium y Mobile Chrome en CI; firefox/webkit/mobile safari solo en local
  package_notes: package.json mantiene un script test placeholder; la vía real de tests es dotnet test y Playwright
rules:
  proposal:
    - Escribir intención, alcance, rollback y riesgos antes de implementar.
    - Mantener cada slice preparada para chained PR si supera ~400 líneas de revisión.
  specs:
    - Redactar requisitos y escenarios en español.
    - Usar Given/When/Then y lenguaje RFC 2119 cuando aplique.
  design:
    - Empezar por la decisión, la justificación arquitectónica y los trade-offs.
    - Documentar impacto en Clean Architecture, CQRS, DDD y seguridad si aplica.
  tasks:
    - Agrupar por fase y mantener tareas ejecutables en una sola sesión.
    - Diseñar slices compatibles con chained PR obligatoria cuando el cambio lo pida.
  apply:
    - Respetar Clean Architecture, CQRS, DDD, Supabase solo en Infrastructure y observabilidad Sentry-only.
    - Escribir tests antes de implementar y mantener RED-GREEN-REFACTOR.
    tdd: true
    test_command: dotnet test
  verify:
    test_command: dotnet test
    build_command: dotnet build
    e2e_command: npx playwright test --config=e2e/playwright.config.ts --project=chromium
    coverage_threshold:
      domain: 80
      application: 70
  archive:
    - Conservar los cambios archivados como rastro de auditoría en openspec/changes/archive.
    - Sincronizar las deltas aprobadas en openspec/specs antes de cerrar el cambio.
